[pytest]
testpaths = server/tests
# Hard per-test deadline: a hung test (e.g. a TestClient/lifespan deadlock under
# a mismatched anyio/httpx stack) fails fast with a traceback instead of silently
# eating the CI budget. Model-backed tests in test_engines.py load a model, so the
# ceiling is generous. Requires pytest-timeout (pinned in requirements/requirements.in).
timeout = 60
timeout_method = thread
# Built-in fallback (no plugin needed): dump every thread's stack if a test runs
# past this, so a hang is diagnosable even if pytest-timeout is absent.
faulthandler_timeout = 70
