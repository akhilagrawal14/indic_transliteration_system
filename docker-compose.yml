version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - XLIT_ENGINE=${XLIT_ENGINE:-ct2}
      - XLIT_DICT_PATH=/app/server/data/dictionary_hi.json
      - XLIT_MODEL_DIR=/app/models/indicxlit/ct2_int8
      - XLIT_LANG=${XLIT_LANG:-hi}
      - XLIT_BEAM_WIDTH=${XLIT_BEAM_WIDTH:-5}
      - XLIT_TOPK=${XLIT_TOPK:-5}
      - XLIT_LRU_CACHE_SIZE=${XLIT_LRU_CACHE_SIZE:-10000}
      - XLIT_DEVICE=cpu
      - XLIT_LOG_LEVEL=${XLIT_LOG_LEVEL:-info}
      - WORKERS=${WORKERS:-4}
    volumes:
      - ./models:/app/models:ro
      - ./server/data:/app/server/data:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./demo
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # Server-side only: the frontend proxies /api/* to the backend internally
      # (see demo/src/app/api/transliterate/route.ts). Never sent to the browser,
      # so the backend stays private; only the frontend needs to be exposed.
      - BACKEND_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped